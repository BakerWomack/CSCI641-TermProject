events {}

http {
  upstream policy_engine { server policy-engine:8080; }
  upstream app_service { server app-service:8000; }

  proxy_ssl_trusted_certificate /etc/nginx/internal-certs/ca.pem;
  proxy_ssl_verify on;
  proxy_ssl_verify_depth 2;
  proxy_ssl_certificate /etc/nginx/internal-certs/nginx-client.crt;
  proxy_ssl_certificate_key /etc/nginx/internal-certs/nginx-client.key;

  server {
    listen 443 ssl;
    server_name _;
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_client_certificate /etc/nginx/certs/ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    location = /login { root /usr/share/nginx/html; try_files /login.html =404; }

    location = /home { root /usr/share/nginx/html; try_files /home.html =404; }

    location = /api/login {
      proxy_ssl_name policy-engine;
      proxy_pass https://policy_engine/authenticate;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Target-URL $scheme://$host$request_uri;
      proxy_set_header X-Device-ID $http_x_device_id;
      proxy_set_header X-Client-Verify $ssl_client_verify;
      proxy_set_header X-Client-DN $ssl_client_s_dn;
      proxy_set_header X-Client-Serial $ssl_client_serial;
      proxy_set_header Content-Type application/json;
    }

    location = /_authz {
      internal;
      proxy_method POST;
      proxy_ssl_name policy-engine;
      proxy_pass https://policy_engine/authenticate;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Target-URL $scheme://$host$request_uri;
      proxy_set_header X-Device-ID $http_x_device_id;
      proxy_set_header X-Client-Verify $ssl_client_verify;
      proxy_set_header X-Client-DN $ssl_client_s_dn;
      proxy_set_header X-Client-Serial $ssl_client_serial;
    }

    location /api/ {
      auth_request /_authz;
      proxy_ssl_name app-service;
      proxy_pass https://app_service;
      proxy_set_header X-Client-Verify $ssl_client_verify;
      proxy_set_header X-Client-DN $ssl_client_s_dn;
      proxy_set_header X-Client-Serial $ssl_client_serial;
    }

    error_page 495 496 = @mtls_required;
    location @mtls_required {
      default_type application/json;
      return 401 '{"error":"mTLS client certificate required or invalid"}';
    }
  }
}